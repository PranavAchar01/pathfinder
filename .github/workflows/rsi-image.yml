name: Build RSI trainer image

on:
  push:
    branches: [main]
    paths:
      - "runpod/rsi/**"
      - ".github/workflows/rsi-image.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: runpod/rsi
          file: runpod/rsi/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/pranavachar01/pathfinder-rsi:latest
